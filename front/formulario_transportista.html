<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Transportista</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="styles/index.css">
    <link rel="stylesheet" href="styles/formularios.css">
</head>
<body>

    <div class="d-flex" id="wrapper">
        <nav id="sidebar-container" class="bg-primary-traxion">
            <div class="logo-container text-center">
                <img src="../img/logo.png" alt="TRAXION LOGO" class="img-fluid logo-placeholder">
            </div>
            <div class="list-group list-group-flush mt-4">
                <a href="#" onclick="showSection('cuidado')" class="menu-item active" id="btn-cuidado" data-role="administrador transportista">
                    Cuidado de la flota
                </a>
                <a href="#" onclick="showSection('admin')" class="menu-item" id="btn-admin" data-role="administrador">
                    Panel de Administrador
                </a>
                <a href="#" onclick="showSection('chat-admin')" class="menu-item" id="btn-chat-admin" data-role="administrador">
                    Chatbot Administrador
                </a>
                <a href="#" onclick="showSection('chat-trans')" class="menu-item" id="btn-chat-trans" data-role="transportista">
                    Chatbot Transportista
                </a>
            </div>
        </nav>

        <div id="page-content-wrapper">

            <nav class="navbar navbar-expand-lg navbar-light bg-primary-traxion py-2 px-4 shadow-sm">
                <div class="ms-auto d-flex align-items-center" id="menu-usuario-container">
                    
                </div>
            </nav>

            <div class="hero-banner">
                <div class="overlay"></div>
                <div class="hero-text text-center text-white">
                    <h1 class="fw-bold text-uppercase">Mantenimiento eficiente, camino seguro</h1>
                    <p class="lead">Traxion, de la mano con tu seguridad</p>
                </div>
            </div>

            <div class="container-fluid p-4">
                
                <section id="sec-form-colab" class="content-card shadow-lg active-section">
                    <div class="form-stepper-container">
                        <div class="text-center mb-4">
                            <h2 class="fw-bold">Registro de Operación</h2>
                            <p class="text-muted">Paso <span id="current-step-text">1</span> de <span id="total-steps-text">x</span></p>
                            <div class="progress" style="height: 10px; border-radius: 20px;">
                                <div id="form-progress-bar" class="progress-bar bg-dark" role="progressbar" style="width: 0%;"></div>
                            </div>
                        </div>

                        <div id="dynamic-questions-container" class="position-relative">
                            </div>

                        <div class="d-flex justify-content-between mt-5 pt-3 border-top">
                            <button type="button" id="btn-prev" class="btn btn-outline-dark px-4 rounded-pill d-none">
                                <i class="bi bi-arrow-left me-2"></i> Anterior
                            </button>
                            <button type="button" id="btn-next" class="btn btn-dark px-4 rounded-pill ms-auto">
                                Siguiente <i class="bi bi-arrow-right ms-2"></i>
                            </button>
                            <button type="button" id="btn-submit" class="btn btn-success px-4 rounded-pill ms-auto d-none">
                                Enviar Reporte <i class="bi bi-check-circle ms-2"></i>
                            </button>
                        </div>
                    </div>

                
                </section>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        function showSection(sectionId) {
            // Ocultar todas
            document.querySelectorAll('section').forEach(s => s.classList.add('d-none'));
            document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
            
            // Mostrar seleccionada
            if(sectionId === 'cuidado') {
                document.getElementById('sec-cuidado').classList.remove('d-none');
                document.getElementById('btn-cuidado').classList.add('active');
            } else if(sectionId === 'admin') {
                document.getElementById('sec-admin').classList.remove('d-none');
                document.getElementById('btn-admin').classList.add('active');
            } else if(sectionId === 'chat-admin') {
                document.getElementById('sec-chat-admin').classList.remove('d-none');
                document.getElementById('btn-chat-admin').classList.add('active');
            } else if(sectionId === 'chat-trans') {
                document.getElementById('sec-chat-trans').classList.remove('d-none');
                document.getElementById('btn-chat-trans').classList.add('active');
            }
        }

document.addEventListener("DOMContentLoaded", () => {
        // Mostrar la primera sección por defecto
        //showSection('cuidado'); 

        const usuarioLogueado = sessionStorage.getItem("usuarioLogueado");
        const contenedorMenu = document.getElementById("menu-usuario-container");
        
        if (usuarioLogueado) {
            // SI ESTÁ LOGUEADO: Mostramos su nombre y el dropdown completo
            contenedorMenu.innerHTML = `
                <p class="rol-header mb-0 me-3">En línea</p>
                <div class="dropdown">
                    <a class="nav-link dropdown-toggle text-dark fw-bold" href="#" role="button" id="userMenu" data-bs-toggle="dropdown" aria-expanded="false">
                        ¡Hola, ${usuarioLogueado}!
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end shadow border-0" aria-labelledby="userMenu">
                        <li><a class="dropdown-item" href="registro.html"><i class="bi bi-person-plus me-2"></i>Registrar usuario</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item text-danger fw-bold" href="#" id="btnCerrarSesion"><i class="bi bi-box-arrow-right me-2"></i>Cerrar sesión</a></li>
                    </ul>
                </div>
            `;

            // Le damos función al botón de cerrar sesión
            document.getElementById("btnCerrarSesion").addEventListener("click", (e) => {
                e.preventDefault(); // Evita que la página salte
                sessionStorage.removeItem("usuarioLogueado"); // Borramos la memoria
                window.location.reload(); // Recargamos para que aparezca "Iniciar sesión"
            });

        } else {
            // SI NO ESTÁ LOGUEADO: Mostramos un botón llamativo para iniciar sesión
            contenedorMenu.innerHTML = `
                <a href="login.html" class="btn btn-dark fw-bold px-4 py-2 rounded-pill shadow-sm">
                    <i class="bi bi-box-arrow-in-right me-2"></i> Iniciar Sesión
                </a>
            `;
        }
    });
    </script>
    <script src="../back/roles.js"></script>
    <script src="../back/formulario_transportista.js"></script>
</body>
</html>
