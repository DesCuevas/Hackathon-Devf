<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Panel Traxion</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="styles/index.css">
    <style>
        body { background-color: var(--traxion-yellow); height: 100vh; display: flex; align-items: center; justify-content: center; }
        .auth-card { width: 100%; max-width: 450px; padding: 40px; margin: 20px; }
    </style>
</head>
<body>

    <div class="content-card shadow-lg auth-card text-center">
        <img src="img/logo.png" alt="TRAXION LOGO" class="img-fluid mb-4" style="max-height: 60px;">
        <h3 class="fw-bold mb-4">Iniciar Sesión</h3>
        
        <form id="loginForm">
            <div class="mb-3 text-start">
                <label for="idCamionero" class="form-label fw-bold">ID de Camionero</label>
                <input type="text" class="form-control" id="idCamionero" placeholder="Ej. TRX-1029" required>
            </div>
            
            <div class="mb-4 text-start">
                <label for="password" class="form-label fw-bold">Contraseña</label>
                <input type="password" class="form-control" id="password" placeholder="Ingresa tu contraseña" required>
            </div>

            <button type="submit" class="btn btn-dark w-100 fw-bold py-2">Ingresar al Panel</button>
        </form>

        <div id="errorMsg" class="alert alert-danger mt-3 d-none" role="alert">
            Credenciales incorrectas.
        </div>

        <p class="mt-4 text-muted">¿No tienes cuenta? <a href="registro.html" class="text-dark fw-bold">Habla con tu administrador</a></p>
    </div>

    <script src="../back/login.js"></script>
</body>
</html>
