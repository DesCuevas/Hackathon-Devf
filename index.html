<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Traxion - Gestión y Seguridad</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="styles/index.css">
</head>
<body>

    <div class="d-flex" id="wrapper">
        <nav id="sidebar-container" class="bg-primary-traxion">
            <div class="logo-container text-center">
                <img src="img/logo.png" alt="TRAXION LOGO" class="img-fluid logo-placeholder">
            </div>
            
            <div class="list-group list-group-flush mt-4" id="sidebar-menu">
                <a href="#" onclick="showSection('cuidado')" class="menu-item active" id="btn-cuidado" data-role="administrador transportista">Cuidado de la flota</a>
                <a href="#" onclick="showSection('admin')" class="menu-item" id="btn-admin" data-role="administrador">Panel de Administrador</a>
                <a href="#" onclick="showSection('chat-admin')" class="menu-item" id="btn-chat-admin" data-role="administrador">Chatbot Administrador</a>
                <a href="#" onclick="showSection('chat-trans')" class="menu-item" id="btn-chat-trans" data-role="transportista">Chatbot Transportista</a>
            </div>
        </nav>

        <div id="page-content-wrapper">
            <nav class="navbar navbar-expand-lg navbar-light bg-primary-traxion py-2 px-4 shadow-sm">
                <div class="ms-auto d-flex align-items-center" id="menu-usuario-container"></div>
            </nav>

            <div class="hero-banner">
                <div class="overlay"></div>
                <div class="hero-text text-center text-white">
                    <h1 class="fw-bold text-uppercase">Mantenimiento eficiente, camino seguro</h1>
                    <p class="lead">Traxion, de la mano con tu seguridad</p>
                </div>
            </div>

            <div class="container-fluid p-4">
                <div id="contenedor-vistas">
                    </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="back/index.js"></script>
</body>
</html>
